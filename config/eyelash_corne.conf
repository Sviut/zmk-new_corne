# Включаем режим сна для экономии батареи
CONFIG_ZMK_SLEEP=y
# Засыпать после 30 минут бездействия (30*60*1000ms)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# Включаем поддержку OLED экранов
CONFIG_ZMK_DISPLAY=y

# Включаем RGB подсветку (если она у вас есть)
CONFIG_ZMK_RGB_UNDERGLOW=y
# Но не включать ее при старте, чтобы экономить батарею
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=n

# Включаем NKRO для лучшей совместимости
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y

# Увеличиваем мощность передатчика Bluetooth для лучшего сигнала
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Включаем возможность программного выключения
CONFIG_ZMK_PM_SOFT_OFF=y
